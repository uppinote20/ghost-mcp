name: Publish Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          draft_tag=$(gh release list --json tagName,isDraft -q '.[] | select(.isDraft) | .tagName' | head -1)

          if [ -n "$draft_tag" ]; then
            gh release edit "$draft_tag" --tag "$TAG" --title "$TAG" --draft=false
            echo "Published draft release as $TAG"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
            echo "Created new release $TAG (no draft found)"
          fi
