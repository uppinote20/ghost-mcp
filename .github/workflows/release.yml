name: Publish Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: |
          npm run build
          npm test

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          draft_count=$(gh release list --json isDraft -q '[.[] | select(.isDraft)] | length')
          if [ "$draft_count" -gt 1 ]; then
            echo "ERROR: multiple draft releases found ($draft_count). Manual cleanup required to avoid attaching wrong notes." >&2
            exit 1
          fi

          draft_tag=$(gh release list --json tagName,isDraft -q '.[] | select(.isDraft) | .tagName' | head -1)

          if [ -n "$draft_tag" ]; then
            gh release edit "$draft_tag" --tag "$TAG" --title "$TAG" --draft=false
            echo "Published draft release as $TAG"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
            echo "Created new release $TAG (no draft found)"
          fi
